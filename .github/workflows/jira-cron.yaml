name: Jira Cron Job

on:
    schedule:
        - cron: '5 12 * * 1-5'
    workflow_dispatch:

jobs:
    sync_jira:
        runs-on: ubuntu-latest
        steps:
            - name: Jira job daily
              run: |
                  curl -f -X GET "https://jira-time-logger-six.vercel.app/api/cron/worklog" \
                  -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
